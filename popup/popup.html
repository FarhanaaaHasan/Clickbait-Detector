<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clickbait Detector Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-area">
        <h1>Detector <span>Pro</span></h1>
      </div>
      <div class="status-badge" id="status-badge">Active</div>
    </header>

    <div class="stats-container">
      <div class="stat-card">
        <span class="stat-label">Scanned</span>
        <span class="stat-value" id="stats-scanned">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Caught</span>
        <span class="stat-value warning" id="stats-caught">0</span>
      </div>
    </div>

    <div class="settings-area">
      <div class="setting-item">
        <div class="setting-text">
          <h3>Real-time Scanning</h3>
          <p>Analyze headlines as you scroll</p>
        </div>
        <label class="switch">
          <input type="checkbox" id="toggle-detector" checked>
          <span class="slider round"></span>
        </label>
      </div>
    </div>

    <footer>
      <p>Clickbait Detector v1.0</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
